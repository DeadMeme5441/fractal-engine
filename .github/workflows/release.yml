name: release

# On every v* tag this does BOTH halves of a release:
#   1. publishes the thin library jar to Clojars
#      (net.clojars.deadmeme5441/fractal-engine), and
#   2. builds the `fractal` CLI uberjar and attaches it to a GitHub release.
# Cutting a release is then just:
#   git tag -a v1.2.3 -F notes.md   # the tag's annotation becomes the release notes
#   git push origin v1.2.3
# The version is derived from the tag (minus the `v`) and threaded into the build
# via RELEASE_VERSION, so the tag, jar name, and pom never drift. The workflow at
# the tagged commit is the one that runs, so the tag must point at a commit that
# already contains this file.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Clojure CLI
        run: |
          curl -fsSL -O https://github.com/clojure/brew-install/releases/latest/download/posix-install.sh
          chmod +x posix-install.sh
          sudo ./posix-install.sh
          clojure --version

      - name: Derive version from tag
        id: ver
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing version $V"

      - name: Run tests
        run: clojure -M:test

      - name: Build library jar
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: clojure -T:build jar      # -> target/fractal-engine-<version>.jar

      - name: Publish library to Clojars
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: |
          clojure -X:deploy \
            :artifact "\"target/fractal-engine-${{ steps.ver.outputs.version }}.jar\""

      - name: Build uberjar
        run: clojure -T:build uber      # -> target/fractal.jar (cleans target first)

      - name: Smoke-test the jar
        run: java -jar target/fractal.jar help

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            target/fractal.jar \
            --title "fractal-engine ${GITHUB_REF_NAME}" \
            --notes-from-tag \
            --verify-tag
